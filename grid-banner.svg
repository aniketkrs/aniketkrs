<svg width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
    </pattern>
    <radialGradient id="fade" cx="50%" cy="50%" r="60%" fx="50%" fy="50%">
      <stop offset="15%" stop-color="#09090b" stop-opacity="0" />
      <stop offset="100%" stop-color="#09090b" stop-opacity="1" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#09090b" />
  
  <!-- Grid -->
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <!-- Fade Mask to center -->
  <rect width="100%" height="100%" fill="url(#fade)" />

  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 56px; font-weight: 800; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; letter-spacing: -2px; }
    .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 500; fill: #a1a1aa; text-anchor: middle; dominant-baseline: middle; letter-spacing: 1px; }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate { animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .delay-1 { animation-delay: 0.3s; opacity: 0; }
  </style>
  
  <text x="50%" y="45%" class="title animate">Aniket</text>
  <text x="50%" y="65%" class="subtitle animate delay-1">Product Manager &bull; Creative Engineer</text>
</svg>
