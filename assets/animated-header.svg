<svg width="800" height="150" viewBox="0 0 800 150" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Fira+Code:wght@700&amp;display=swap");
    
    :root {
      --text-color: #ffffff;
      --glow-color: #6366f1;
    }
    
    @media (prefers-color-scheme: light) {
      :root {
        --text-color: #0f172a;
        --glow-color: #3b82f6;
      }
    }

    @keyframes cyber-pulse {
      0% { text-shadow: 0 0 10px var(--glow-color), 0 0 20px var(--glow-color); filter: brightness(1); }
      50% { text-shadow: 0 0 20px var(--glow-color), 0 0 40px var(--glow-color); filter: brightness(1.2) hue-rotate(15deg); }
      100% { text-shadow: 0 0 10px var(--glow-color), 0 0 20px var(--glow-color); filter: brightness(1); }
    }

    @keyframes glitch {
      0%, 96%, 100% { transform: translate(0); }
      97% { transform: translate(-3px, 2px); }
      98% { transform: translate(3px, -2px); }
      99% { transform: translate(-3px, 0); }
    }

    .ascii-text {
      font-family: "Fira Code", monospace;
      font-weight: 700;
      font-size: 14px;
      fill: var(--text-color);
      animation: cyber-pulse 3s infinite, glitch 5s infinite;
      white-space: pre;
    }
  </style>
  
  <g transform="translate(400, 75)" text-anchor="middle">
    <text x="0" y="-30" class="ascii-text">    ___    _   __  ____  __ __  ______  ______       __ __   __  __   __  ___  ___    ____ </text>
    <text x="0" y="-12" class="ascii-text">   /   |  / | / / /  _/ / //_/ / ____/ /_  __/      / //_/  / / / /  /  |/  / /   |  / __ \</text>
    <text x="0" y="6" class="ascii-text">  / /| | /  |/ /  / /  / ,&lt;   / __/     / /        / ,&lt;    / / / /  / /|_/ / / /| | / /_/ /</text>
    <text x="0" y="24" class="ascii-text"> / ___ |/ /|  / _/ /  / /| | / /___    / /        / /| |  / /_/ /  / /  / / / ___ |/ _, _/ </text>
    <text x="0" y="42" class="ascii-text">/_/  |_/_/ |_/ /___/ /_/ |_|/_____/   /_/        /_/ |_|  \____/  /_/  /_/ /_/  |_/_/ |_|  </text>
  </g>
</svg>
