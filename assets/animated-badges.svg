<svg width="800" height="50" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-0px); }
    }
    .marquee-container {
      animation: marquee 25s linear infinite;
    }
    .badge-row {
      transition: filter 0.3s;
    }
    .badge-row:hover {
      filter: drop-shadow(0 4px 8px rgba(79, 70, 229, 0.4));
    }
  </style>
  <g class="marquee-container">
    <g class="badge-row">

    </g>
    <g class="badge-row" transform="translate(0, 0)">

    </g>
  </g>
</svg>